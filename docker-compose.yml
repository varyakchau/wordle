services:
  web:
    build: .
    command: make start
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      - db
    env_file:
      - .env

  db:
    image: postgres:16
    container_name: wordle_db
    hostname: db
    env_file:
      - .env
    volumes:
      - wordle_postgres_data:/var/lib/postgresql/data


volumes:
  wordle_postgres_data:
