<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordle: гуманитарный эдишн</title>
  <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0; padding: 0;
      font-family: 'Lobster', sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; background: #00FFFF; color: #FF1493;
      position: relative; overflow: hidden;
    }
    .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .star  { position: absolute; font-size: 20px; animation: twinkle 2s infinite alternate; }
    @keyframes twinkle { 0% { opacity: 1; } 100% { opacity: 0.4; } }

    h1 {
      color: #FF1493; font-size: 4em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
      margin: 0 0 20px 0; text-align: center; z-index: 1;
    }
    .omg-button {
      padding: 30px 80px; font-family: 'Lobster', sans-serif;
      font-size: 2em; font-weight: bold; color: #fff;
      background-color: #FF1493; border: none; border-radius: 50px;
      cursor: pointer; box-shadow: 0 8px 16px rgba(0,0,0,0.3);
      transition: background-color 0.3s, transform 0.3s;
      text-decoration: none; display: inline-block; z-index: 1; position: relative;
    }
    .omg-button:hover { background-color: #e0117a; transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <h1>Wordle: гуманитарный эдишн</h1>
  <a href="/auth/" class="omg-button">Играть сейчас</a>

  <script>
    const stars = document.getElementById('stars');
    for (let i = 0; i < 30; i++) {
      const left = (Math.random() * 100).toFixed(1);
      const top  = (Math.random() * 100).toFixed(1);
      const dur  = (1 + Math.random() * 2).toFixed(2);
      stars.insertAdjacentHTML('beforeend',
        `<div class="star" style="left:${left}%;top:${top}%;animation-duration:${dur}s">⭐</div>`
      );
    }
  </script>
</body>
</html>
